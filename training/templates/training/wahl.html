{% extends "base.html" %}

{% block title %}Vignette gewählt{% endblock %}

{% block content %}
    <h1>Vignette gewählt</h1>
    <p>{{ vignette.historie.name|default:vignette.fach }}</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Training starten</button>
    </form>
    <p><a href="{% url 'training:detail' training.pk %}">Zurück zum Training</a></p>
{% endblock %}
