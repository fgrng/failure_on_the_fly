{% load static %}
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}failure_on_the_fly{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/fonts.css' %}">
    <link rel="stylesheet" href="{% static 'css/tokens.css' %}">
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    <script src="{% static 'js/htmx.min.js' %}" defer></script>
    <script src="{% static 'js/alpine.min.js' %}" defer></script>
</head>
<body>
    <header class="site-header">
        <div class="site-header__inner">
            <a class="site-brand" href="/">FailureOnTheFly</a>
            <nav class="site-nav" aria-label="Hauptnavigation">
                {% if user.is_authenticated %}
                    <a href="{% url 'training:katalog' %}">Trainings</a>
                    <a href="{% url 'training:liste' %}">Meine Trainings</a>
                {% endif %}
                {% block nav %}{% endblock %}
            </nav>
        </div>
    </header>

    <main class="site-main">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="site-footer__inner">
            {% block footer %}FailureOnTheFly{% endblock %}
        </div>
    </footer>
</body>
</html>
