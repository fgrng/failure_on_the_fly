<section class="spracheingabe" data-spracheingabe data-formular-id="{{ formular_id }}" data-eingabe-id="{{ eingabe_id }}" data-tastatureingabe-id="{{ tastatureingabe_id }}" data-transkription-url="{{ transkription_url }}" data-automatisch-absenden="{{ automatisch_absenden }}" data-sitzung-pk="{{ sitzung_pk }}" aria-label="{{ aufnahme_titel }}">
    <h2>{{ aufnahme_titel }}</h2>
    <button class="button spracheingabe__steuerung" type="button" aria-pressed="false">Aufnahme starten</button>
    <p class="spracheingabe__status" aria-live="polite">{{ aufnahme_hinweis }}</p>
</section>
